name: Daily Gemini Fortune Automation

on:
  schedule:
    - cron: '42 14 * * *' # 매일 오후 3시에 실행 (UTC 기준, 한국 시간으로는 매일 자정)
  workflow_dispatch: # 깃허브 웹에서 원할 때 수동으로 실행할 수 있는 버튼도 만들어라!

jobs:
  generate-fortune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Fortune Cron Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }} # 💡 여기에 디스코드 웹후크 시크릿 주입!
        run: node cron-fortune.js